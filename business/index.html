<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>בר משה — שירותים: לימוד, ליווי, ובנייה</title>
<meta name="description" content="בר משה — מפתח עצמאי. שיעורים פרטיים, ליווי טכני, ובניית אפליקציות, אתרים ורעיונות יצירתיים.">
<script>
  /* Marketing pre-paint resolver. Light by default; ignores portfolio's
     bm:theme and prefers-color-scheme. Dark only opts in if the user
     explicitly toggles via MarketingThemeToggle, which writes
     bm:marketing-theme. Accessibility prefs (contrast, scale, readable)
     stay in sync with the portfolio so user choices carry over. */
  (function(){
    try{
      var html = document.documentElement;
      html.classList.remove("dark");
      var marketingTheme = localStorage.getItem("bm:marketing-theme");
      if (marketingTheme === "dark") html.classList.add("dark");
      html.dataset.themePref = marketingTheme === "dark" ? "dark" : "light";
      html.dataset.marketingTheme = marketingTheme === "dark" ? "dark" : "light";

      var contrast = localStorage.getItem("bm:contrast");
      if (contrast === "more" || contrast === "less") html.dataset.contrast = contrast;
      var scale = parseFloat(localStorage.getItem("bm:text-scale"));
      if (scale && scale !== 1) html.style.setProperty("--text-scale", String(scale));
      if (localStorage.getItem("bm:readable") === "1") html.dataset.readable = "true";
    }catch(e){}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Heebo:wght@400;500;700;900&display=swap">
</head>

</html>
