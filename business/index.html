<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>בר משה — שירותים: לימוד, ליווי, ובנייה</title>
<meta name="description" content="בר משה — מפתח עצמאי. שיעורים פרטיים, ליווי טכני, ובניית אפליקציות, אתרים ורעיונות יצירתיים.">
<script>
  /* Pre-paint theme + a11y resolver - mirrors index.html so the same prefs apply
     to the marketing page with no FOUC. Keep in sync with index.html:8-29. */
  (function(){
    try{
      var html = document.documentElement;
      var saved = localStorage.getItem("bm:theme");
      var mq = matchMedia("(prefers-color-scheme: dark)");
      var dark = saved === "dark" || (saved !== "light" && mq.matches);
      if (dark) html.classList.add("dark");
      html.dataset.themePref = saved || "auto";

      var contrast = localStorage.getItem("bm:contrast");
      if (contrast === "more" || contrast === "less") html.dataset.contrast = contrast;
      var scale = parseFloat(localStorage.getItem("bm:text-scale"));
      if (scale && scale !== 1) html.style.setProperty("--text-scale", String(scale));
      if (localStorage.getItem("bm:readable") === "1") html.dataset.readable = "true";
    }catch(e){}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Heebo:wght@400;500;700;900&display=swap">
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/marketing/main.tsx"></script>
</body>
</html>
