<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>BAR MOSHE - v2.0.0</title>
<meta name="description" content="Bar Moshe - Backend engineer, DevOps, AI. Systems that ship.">
<script>
  /* Pre-paint theme resolver - avoid flash. Runs before <body>. */
  (function(){
    try{
      var saved = localStorage.getItem("bm:theme"); // "light" | "dark" | null (auto)
      var mq = matchMedia("(prefers-color-scheme: dark)");
      var dark = saved === "dark" || (saved !== "light" && mq.matches);
      if (dark) document.documentElement.classList.add("dark");
      document.documentElement.dataset.themePref = saved || "auto";
    }catch(e){}
  })();
</script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
